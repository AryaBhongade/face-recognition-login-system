<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h1>Face Login</h1>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    {% endif %}
{% endwith %}

<p>Login using face recognition.</p>

<form action="/face-login" method="post">
    <button type="submit">
        Login With Face
    </button>
</form>

<a href="/">Home</a>

</body>
</html>
