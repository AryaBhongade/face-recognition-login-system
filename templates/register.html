<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

<h1>Face Registration</h1>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    {% endif %}
{% endwith %}

<form action="/face-register" method="post">

    <label>Username:</label>
    <input
        type="text"
        name="username"
        required
    >

    <br><br>

    <button type="submit">
        Register With Face
    </button>

</form>

<br>

<a href="/">Home</a>

</body>
</html>
